services:
  # ROS 2 Jazzy + Gazebo Harmonic + PX4 Autopilot + NoVNC
  px4-sitl:
    build:
      context: .
      dockerfile: px4-sitl.Dockerfile
    image: erdemuysalx/px4-sitl:latest
    container_name: px4_sitl
    privileged: true
    stdin_open: true
    tty: true

    # ── GPU passthrough (equivalent of `docker run --gpus all`) ──────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    volumes:
      #- /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./ros2_ws:/root/ros2_ws
      - ./worlds/aufgabe1_fuel_world.sdf:/root/PX4-Autopilot/Tools/simulation/gz/worlds/aufgabe1_fuel_world.sdf:ro

    environment:
      - DISPLAY=:1
      #- DISPLAY=${DISPLAY}
      - PX4_GZ_WORLD=aufgabe1_fuel_world
      # ── GPU: 'graphics' is REQUIRED for Gazebo/EGL rendering. ──────────────
      # The default (utility,compute) does NOT include it, and EGL will still
      # fail with "failed to create dri2 screen" without it.
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    ports:
      - "5901:5901"
      - "6080:6080"
      - "14550:14550/udp"
      - "18570:18570/udp"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s